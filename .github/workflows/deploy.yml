name: Deploy
on:
  push:
    branches:
      - master
concurrency:
  group: deploy-prod
  cancel-in-progress: false
jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Typecheck
        run: bun run typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Lint
        run: bun run lint

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Format
        run: bun run format

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Test
        run: bun run test

  docker-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t subq-test .
      - name: Start container
        run: |
          docker run -d -p 8080:8080 --name subq-test \
            -e DATABASE_PATH=/app/data/test.db \
            -e BETTER_AUTH_SECRET=test-secret-for-ci-must-be-at-least-32-chars \
            -e BETTER_AUTH_URL=http://localhost:8080 \
            -e REMINDER_SECRET=test-reminder-secret \
            -e RESEND_API_KEY=re_test_key \
            subq-test
      - name: Wait for health check
        run: |
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health; then
              echo ""
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 1
          done
          echo "Health check failed after 30 seconds"
          docker logs subq-test
          exit 1
      - name: Show logs on failure
        if: failure()
        run: docker logs subq-test

  deploy:
    needs: [typecheck, lint, format, test, docker-smoke-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Set Fly secrets
        run: flyctl secrets set BETTER_AUTH_SECRET="${{ secrets.BETTER_AUTH_SECRET }}" --stage
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

